
{% comment %}
{% extends "base.html" %}
{% endcomment %}
{% load static %}


{% block content %}


<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pose Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.min.js"></script>

</head>
<body class="bg-black text-gray-100 h-screen w-screen overflow-hidden flex flex-col font-sans select-none touch-none">
  
  <!-- Header Bar (Glassmorphism) -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-black/40 backdrop-blur-md border-b border-white/10 px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>
      <h1 class="text-sm font-bold uppercase tracking-wider text-white/90">Climb Stream</h1>
    </div>
    
    <div class="flex items-center gap-3">
      <select id="modeSelect" class="bg-blue-600/30 text-blue-300 border border-blue-500/30 rounded-full px-4 py-1 text-xs font-bold uppercase outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer">
        <option value="pose">Pose</option>

        <option value="light">Light</option>
      </select>
      <button id="gearBtn" class="p-2 bg-white/5 hover:bg-white/10 rounded-full transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Viewport -->
  <main class="relative flex-grow h-full w-full bg-[#111] flex items-center justify-center overflow-hidden">
    <div id="videoContainer" class="relative group cursor-pointer">
      <video id="video" playsinline autoplay muted class="max-h-screen max-w-full rounded-sm shadow-2xl brightness-110 contrast-105"></video>
      <canvas id="output" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
      
      <!-- Quick Status -->
      <div id="statusToast" class="absolute top-4 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-black/60 backdrop-blur-md rounded-full text-xs font-medium border border-white/10 opacity-0 transition-opacity pointer-events-none z-10">
        Disconnected
      </div>

      <!-- Mask Editing Indicator -->
      <div id="maskEditIndicator" class="absolute inset-0 bg-blue-500/10 border-4 border-dashed border-blue-500/30 pointer-events-none hidden flex items-center justify-center">
          <div class="bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-bold uppercase animate-pulse shadow-2xl">
              Mask Edit Mode: Click 4 Points
          </div>
      </div>
    </div>
  </main>

  <!-- Side Settings (Drawer) -->
  <aside id="sideMenu" class="fixed top-0 bottom-0 right-[-320px] w-[300px] z-[100] bg-[#1a1a1a] shadow-2xl border-l border-white/10 transition-all duration-300 p-6 flex flex-col gap-8">
    <div class="flex items-center justify-between border-b border-white/5 pb-4">
      <h2 class="text-lg font-semibold tracking-tight">Settings</h2>
      <button id="closeMenuBtn" class="p-1.5 text-white/50 hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <div class="space-y-6">
      <!-- Camera Section -->
      <div>
        <label class="block text-xs font-bold uppercase text-white/40 mb-3 tracking-widest">Input Source</label>
        <div class="space-y-4">
          <select id="cameraSelect" class="w-full bg-[#333] border-none rounded-lg px-3 py-2 text-sm text-white/90 outline-none ring-1 ring-white/10 focus:ring-blue-500/50"></select>
          <div class="space-y-1">
            <div class="flex justify-between text-xs font-medium mb-1">
                <span>Zoom</span>
                <span id="zoomVal" class="text-blue-400">1.0x</span>
            </div>
            <input id="zoomRange" type="range" min="1" max="1" step="0.1" value="1" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-500">
          </div>
        </div>
      </div>

      <!-- Network Section -->
      <div>
        <label class="block text-xs font-bold uppercase text-white/40 mb-3 tracking-widest">WebSocket Link</label>
        <div class="flex flex-col gap-2">
          <input id="wsUrl" type="text" class="w-full bg-[#333] border-none rounded-lg px-3 py-2 text-xs text-white/90 outline-none ring-1 ring-white/10 focus:ring-blue-500/50" placeholder="wss://...">
          <div class="flex gap-2">
            <button id="connectBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-xs font-bold uppercase transition-all shadow-lg active:scale-95">Link</button>
            <button id="disconnectBtn" class="bg-white/5 hover:bg-white/10 text-white/70 py-2 px-4 rounded-lg text-xs font-bold uppercase transition-all">Unlink</button>
          </div>
        </div>
      </div>

      <!-- Masking Section -->
      <div id="maskingControls" class="mb-6 pb-6 border-b border-white/5">
          <div class="flex items-center justify-between mb-3">
              <label class="block text-xs font-bold uppercase text-white/40 tracking-widest">Detection Mask</label>
              <div id="maskStatus" class="px-2 py-0.5 rounded text-[8px] font-bold uppercase bg-white/5 text-white/30">Inactive</div>
          </div>
          <div class="grid grid-cols-2 gap-2">
              <button id="editMaskBtn" class="bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-500/30 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Edit Mask</button>
              <button id="resetMaskBtn" class="bg-red-600/20 hover:bg-red-600/30 text-red-400 border border-red-500/30 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Reset</button>
          </div>
          <p class="text-[10px] text-white/30 mt-2 leading-tight">Define a 4-point area for active detection.</p>
      </div>

      <!-- Detection Controls (Dynamic) -->
      <div id="detectionSettings" class="pt-4 border-t border-white/5">
        <label class="block text-xs font-bold uppercase text-white/40 mb-4 tracking-widest">Calibration</label>
        


        <div id="lightControls" class="space-y-4 hidden">
          <div class="space-y-1">
            <div class="flex justify-between text-xs font-medium mb-1">
                <span>Change Threshold</span>
                <span id="lightThreshDisplay" class="text-blue-400">30</span>
            </div>
            <input id="lightThreshSlider" type="range" min="5" max="100" step="5" value="30" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-500">
          </div>
        </div>

        <div class="space-y-1 mt-4">
            <div class="flex justify-between text-xs font-medium mb-1">
                <span>Send Delay</span>
                <span id="rateDisplay" class="text-blue-400">0s</span>
            </div>
            <input id="poseRateSlider" type="range" min="0" max="3" step="0.1" value="0" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
      </div>
    </div>

    <!-- Footer Settings -->
    <div class="mt-auto space-y-4 mb-4">
        <label class="block text-xs font-bold uppercase text-white/40 mb-2 tracking-widest uppercase">View</label>
        <div class="flex bg-white/5 p-1 rounded-xl">
            <button onclick="setView('both')" class="viewBtn flex-1 py-1.5 text-[10px] uppercase font-bold text-white/40 rounded-lg bg-white/10 text-white/90">Mix</button>
            <button onclick="setView('video')" class="viewBtn flex-1 py-1.5 text-[10px] uppercase font-bold text-white/40 rounded-lg">Raw</button>
            <button onclick="setView('pose')" class="viewBtn flex-1 py-1.5 text-[10px] uppercase font-bold text-white/40 rounded-lg">Data</button>
        </div>
        <button id="fsOutputBtn" class="w-full py-2.5 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-wider text-white/60 hover:bg-white/10">Toggle Fullscreen</button>
    </div>
  </aside>

  <!-- Interactive Backdrop (for side menu) -->
  <div id="sideMenuBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[90] hidden"></div>

<script>
  // UI Elements
  const video = document.getElementById('video');
  const canvas = document.getElementById('output');
  const ctx = canvas.getContext('2d');
  const wsUrlInput = document.getElementById('wsUrl');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const modeSelect = document.getElementById('modeSelect');
  const detectionSettings = document.getElementById('detectionSettings');

  const lightControls = document.getElementById('lightControls');
  const zoomRangeInput = document.getElementById('zoomRange');
  const poseRateSlider = document.getElementById('poseRateSlider');

  const lightThreshSlider = document.getElementById('lightThreshSlider');
  const lightThreshDisplay = document.getElementById('lightThreshDisplay');
  const zoomDisplay = document.getElementById('zoomVal');
  const rateDisplay = document.getElementById('rateDisplay');
  const statusDot = document.getElementById('statusDot');
  const statusToast = document.getElementById('statusToast');
  const sideMenu = document.getElementById('sideMenu');
  const sideMenuBackdrop = document.getElementById('sideMenuBackdrop');
  const editMaskBtn = document.getElementById('editMaskBtn');
  const resetMaskBtn = document.getElementById('resetMaskBtn');
  const maskStatusDisplay = document.getElementById('maskStatus');
  const maskEditIndicator = document.getElementById('maskEditIndicator');
  const videoContainer = document.getElementById('videoContainer');
  var csrf = "{{ csrf_token }}";

  let ws;
  let lastPoseSentTime = 0;
  let currentMode = 'pose'; // 'pose' or 'light'
  let isRecordingHold = false;
  let recordingTimeout = null;
  let bestPointInWindow = null;
  let originalDotClass = '';
  let lastSentLightPoint = null;
  let referenceFrameData = null;  // Uint8Array of per-pixel max(r,g,b) from reference frame
  let referenceWidth = 0;
  let referenceHeight = 0;

  // Masking State
  let maskPoints = [];
  let isEditingMask = false;
  try {
    const savedMask = localStorage.getItem('maskPoints');
    if (savedMask && maskStatusDisplay) {
        maskPoints = JSON.parse(savedMask);
        maskStatusDisplay.textContent = 'Active';
        maskStatusDisplay.classList.replace('bg-white/5', 'bg-green-500/20');
        maskStatusDisplay.classList.replace('text-white/30', 'text-green-400');
    }
  } catch(e) { console.error('Error loading mask:', e); }

  // Load saved settings or defaults
  const savedUrl = localStorage.getItem('wsUrl') || 'wss://a.com';
  const savedCam = localStorage.getItem('cameraId');
  const savedZoom = localStorage.getItem('zoom') || 1;
  const savedPoseRate = localStorage.getItem('poseRate') || 0;

  let savedLightThresh = parseInt(localStorage.getItem('lightThresh') || '0');
  if (savedLightThresh > 100) savedLightThresh = 30; // Reset old absolute-brightness value
  const autoReconnect = localStorage.getItem('autoReconnect') === 'true';

  // Safe UI Initialization
  if (wsUrlInput) wsUrlInput.value = savedUrl;
  if (zoomRangeInput) zoomRangeInput.value = savedZoom;
  if (poseRateSlider) {
    poseRateSlider.value = savedPoseRate;
    if (rateDisplay) rateDisplay.textContent = savedPoseRate + 's';
  }

  if (lightThreshSlider) {
    lightThreshSlider.value = savedLightThresh;
    if (lightThreshDisplay) lightThreshDisplay.textContent = savedLightThresh;
  }

  // UI State
  function setStatus(text, cls) {
    statusToast.textContent = text;
    statusToast.style.opacity = '1';
    setTimeout(() => { statusToast.style.opacity = '0'; }, 3000);
    
    // Update status dot color
    if (text === 'Connected') {
        statusDot.className = 'w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]';
    } else if (text === 'Disconnected' || text === 'Error') {
        statusDot.className = 'w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]';
    } else {
        statusDot.className = 'w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]';
    }
  }

  // Menu Handling
  function toggleMenu(show) {
    sideMenu.style.right = show ? '0' : '-320px';
    sideMenuBackdrop.classList.toggle('hidden', !show);
  }

  document.getElementById('gearBtn').onclick = () => toggleMenu(true);
  document.getElementById('closeMenuBtn').onclick = () => toggleMenu(false);
  sideMenuBackdrop.onclick = () => toggleMenu(false);

  // View Handling
  let currentView = 'both';
  function setView(v) {
    currentView = v;
    
    // Always keep video in flow to maintain container dimensions, just hide with opacity
    if (v === 'pose') {
        video.classList.add('opacity-0');
        video.classList.remove('absolute'); // Ensure it's not absolute
        video.style.display = 'block';
        canvas.style.display = 'block';
    } else if (v === 'video') {
        video.classList.remove('opacity-0', 'absolute');
        video.style.display = 'block';
        canvas.style.display = 'none';
    } else { // both (mix)
        video.classList.remove('opacity-0', 'absolute');
        video.style.display = 'block';
        canvas.style.display = 'block';
    }
    
    // Update UI highlights
    document.querySelectorAll('.viewBtn').forEach(btn => {
        const active = btn.textContent.toLowerCase() === (v==='both'?'mix':v==='video'?'raw':'data');
        btn.classList.toggle('bg-white/10', active);
        btn.classList.toggle('text-white/90', active);
        btn.classList.toggle('text-white/40', !active);
    });
  }
  window.setView = setView; // Make globally accessible

  function setMode(mode, fromRemote = false) {
    if (['pose', 'light'].includes(mode)) {
      currentMode = mode;
      modeSelect.value = mode;
      console.log('Mode switched to:', mode);
      
      // Update UI visibility
      detectionSettings.classList.toggle('hidden', mode === 'pose');
      lightControls.classList.toggle('hidden', mode !== 'light');

      // Send state to backend if changed locally
      if (!fromRemote && ws && ws.readyState === WebSocket.OPEN) {
        sendState();
      }
    }
  }

  modeSelect.onchange = () => setMode(modeSelect.value);

  // Masking Logic
  function isPointInPolygon(point, polygon) {
    if (!polygon || polygon.length < 3) return true; // No mask or incomplete mask = always inside
    let x = point.x, y = point.y;
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        let xi = polygon[i].x, yi = polygon[i].y;
        let xj = polygon[j].x, yj = polygon[j].y;
        let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
  }

  editMaskBtn.onclick = (e) => {
    e.stopPropagation();
    isEditingMask = !isEditingMask;
    
    // UI Update
    maskEditIndicator.classList.toggle('hidden', !isEditingMask);
    editMaskBtn.textContent = isEditingMask ? 'Finish Mask' : 'Edit Mask';
    editMaskBtn.classList.toggle('bg-blue-600', isEditingMask);
    editMaskBtn.classList.toggle('bg-blue-600/20', !isEditingMask);
    
    if (isEditingMask) {
        maskPoints = [];
        maskStatusDisplay.textContent = 'Editing...';
        maskStatusDisplay.classList.replace('bg-green-500/20', 'bg-blue-500/20');
        maskStatusDisplay.classList.replace('text-green-400', 'text-blue-400');
        toggleMenu(false); // Close menu so backdrop doesn't block clicks
        setStatus('Click 4 points to define area', 'text-blue-400');
    } else {
        localStorage.setItem('maskPoints', JSON.stringify(maskPoints));
        updateMaskStatus();
    }
  };

  resetMaskBtn.onclick = (e) => {
    e.stopPropagation();
    maskPoints = [];
    localStorage.removeItem('maskPoints');
    isEditingMask = false;
    maskEditIndicator.classList.add('hidden');
    editMaskBtn.textContent = 'Edit Mask';
    editMaskBtn.classList.remove('bg-blue-600');
    editMaskBtn.classList.add('bg-blue-600/20');
    updateMaskStatus();
    setStatus('Mask cleared', 'text-yellow-500');
  };

  function updateMaskStatus() {
    const hasMask = maskPoints && maskPoints.length === 4;
    if (!maskStatusDisplay) return;
    maskStatusDisplay.textContent = hasMask ? 'Active' : 'Inactive';
    if (hasMask) {
        maskStatusDisplay.className = 'px-2 py-0.5 rounded text-[8px] font-bold uppercase bg-green-500/20 text-green-400';
    } else {
        maskStatusDisplay.className = 'px-2 py-0.5 rounded text-[8px] font-bold uppercase bg-white/5 text-white/30';
    }
  }

  videoContainer.addEventListener('click', (e) => {
    if (!isEditingMask) return;
    
    // Get click coordinates relative to current visible videoContainer size
    const rect = videoContainer.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    
    if (maskPoints.length < 4) {
        maskPoints.push({ x, y });
        if (maskPoints.length === 4) {
            isEditingMask = false;
            maskEditIndicator.classList.add('hidden');
            editMaskBtn.textContent = 'Edit Mask';
            editMaskBtn.classList.remove('bg-blue-600');
            editMaskBtn.classList.add('bg-blue-600/20');
            localStorage.setItem('maskPoints', JSON.stringify(maskPoints));
            updateMaskStatus();
            setStatus('Mask saved', 'text-green-500');
        }
    }
  });

  function drawMaskOverlay() {
    if (!maskPoints || maskPoints.length === 0) return;
    
    ctx.beginPath();
    ctx.moveTo(maskPoints[0].x * canvas.width, maskPoints[0].y * canvas.height);
    for (let i = 1; i < maskPoints.length; i++) {
        ctx.lineTo(maskPoints[i].x * canvas.width, maskPoints[i].y * canvas.height);
    }
    if (maskPoints.length > 2) ctx.closePath();
    
    // Fill
    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; // Blue-500 with low opacity
    if (maskPoints.length >= 3) ctx.fill();
    
    // Stroke
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Points
    maskPoints.forEach((p, idx) => {
        ctx.beginPath();
        ctx.arc(p.x * canvas.width, p.y * canvas.height, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '10px sans-serif';
        ctx.fillText(idx + 1, p.x * canvas.width + 8, p.y * canvas.height + 4);
    });
  }

  function sendState() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'state',
            mode: currentMode === 'light' ? 'draw' : currentMode, // Light is a client-side variation of 'draw'
            zoom: parseFloat(zoomRangeInput.value),
            light_threshold: parseInt(lightThreshSlider.value),
            pose_rate: parseFloat(poseRateSlider.value)
        }));
    }
  }

  function handleRemoteConfig(config) {
    console.log('Remote config received:', config);
    if (config.mode) setMode(config.mode, true);
    
    if (config.zoom !== undefined) {
        zoomRangeInput.value = config.zoom;
        const track = video.srcObject ? video.srcObject.getVideoTracks()[0] : null;
        if (track) {
           track.applyConstraints({ advanced: [{ zoom: config.zoom }] });
        }
        zoomDisplay.textContent = parseFloat(config.zoom).toFixed(1) + 'x';
        localStorage.setItem('zoom', config.zoom);
    }

    if (config.light_threshold !== undefined) {
        lightThreshSlider.value = config.light_threshold;
        lightThreshDisplay.textContent = config.light_threshold;
        localStorage.setItem('lightThresh', config.light_threshold);
    }
    if (config.pose_rate !== undefined) {
        poseRateSlider.value = config.pose_rate;
        rateDisplay.textContent = config.pose_rate + 's';
        localStorage.setItem('poseRate', config.pose_rate);
    }
  }

  function connectWS() {
    const url = wsUrlInput.value.trim();
    if (!url) return;
    localStorage.setItem('wsUrl', url);
    setStatus('Connecting...', 'text-yellow-500');
    ws = new WebSocket(url);
    ws.onopen = () => { 
      setStatus('Connected', 'text-green-600'); 
      localStorage.setItem('autoReconnect', 'true'); 
      sendState(); 
    };
    ws.onclose = () => { 
      setStatus('Disconnected', 'text-red-500'); 
      if(localStorage.getItem('autoReconnect')==='true'){ 
        setTimeout(connectWS,3000); 
      } 
    };
    ws.onerror = () => { setStatus('Error', 'text-red-600'); };
    ws.onmessage = ev => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'get_image' && msg.wall_id) {
          sendImageToApi(msg.wall_id);
        } else if (msg.type === 'config') {
          handleRemoteConfig(msg);
        } else if (msg.mode) {
          setMode(msg.mode, true);
        }
      } catch(e){ console.error(e); }
    };
  }

  function disconnectWS() {
    localStorage.setItem('autoReconnect', 'false');
    if(ws) { ws.close(); }
  }

  connectBtn.onclick = connectWS;
  disconnectBtn.onclick = disconnectWS;

  function sendPose(landmarks, width, height){
    if(ws && ws.readyState === WebSocket.OPEN){
      const maxRate = parseFloat(poseRateSlider.value);
      const currentTime = Date.now();
      if (maxRate === 0) {
        ws.send(JSON.stringify({type:'pose',timestamp:currentTime/1000,width,height,landmarks}));
        return;
      }
      const timeSinceLastSend = currentTime - lastPoseSentTime;
      const minInterval = maxRate * 1000;
      if (timeSinceLastSend >= minInterval) {
        ws.send(JSON.stringify({type:'pose',timestamp:currentTime/1000,width,height,landmarks}));
        lastPoseSentTime = currentTime;
      }
    }
  }



  function sendLight(points, width, height) {
    if(ws && ws.readyState === WebSocket.OPEN){
        const currentTime = Date.now();
        ws.send(JSON.stringify({
            type: 'pose',
            timestamp: currentTime / 1000,
            width,
            height,
            landmarks: [], 
            light_points: points
        }));
    }
  }

  async function sendImageToApi(wall_id) {
    try {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
      const formData = new FormData();
      formData.append('wall_id', wall_id);
      formData.append('image_data', dataUrl);
      const response = await fetch('http://climb.net/api/upload-wall-image/', {
        method: 'POST',
        body: formData,
        headers: { "X-CSRFToken": csrf },
      });
      if (response.ok) console.log('Image uploaded successfully for wall_id:', wall_id);
    } catch (err) { console.error('Error uploading image:', err); }
  }

  async function startCamera(deviceId){
    if(video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { 
            deviceId: deviceId?{exact:deviceId}:undefined,
            width: { ideal: 1280 },
            height: { ideal: 720 }
        } 
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
        video.play();
        workerTicker.postMessage('start');
    };
    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    if(capabilities.zoom){
      zoomRangeInput.min = capabilities.zoom.min;
      zoomRangeInput.max = capabilities.zoom.max;
      zoomRangeInput.step = capabilities.zoom.step || 0.1;
      zoomRangeInput.value = savedZoom;
      zoomDisplay.textContent = parseFloat(zoomRangeInput.value).toFixed(1) + 'x';
      zoomRangeInput.oninput = () => {
        track.applyConstraints({ advanced: [{ zoom: zoomRangeInput.value }] });
        zoomDisplay.textContent = parseFloat(zoomRangeInput.value).toFixed(1) + 'x';
        localStorage.setItem('zoom', zoomRangeInput.value);
        sendState();
      };
      track.applyConstraints({ advanced: [{ zoom: zoomRangeInput.value }] });
    }
    localStorage.setItem('cameraId', deviceId || '');
  }

  async function loadCameras(){
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d=>d.kind==='videoinput');
    cameraSelect.innerHTML = '';
    vids.forEach(d=>{
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      opt.textContent = d.label || `Camera ${cameraSelect.length+1}`;
      cameraSelect.appendChild(opt);
    });
    if(savedCam && vids.some(v=>v.deviceId===savedCam)) cameraSelect.value = savedCam;
    startCamera(cameraSelect.value);
  }

  cameraSelect.onchange = () => startCamera(cameraSelect.value);
  
  poseRateSlider.oninput = () => {
    rateDisplay.textContent = poseRateSlider.value + 's';
    localStorage.setItem('poseRate', poseRateSlider.value);
    sendState();
  };

  lightThreshSlider.oninput = () => {
    lightThreshDisplay.textContent = lightThreshSlider.value;
    localStorage.setItem('lightThresh', lightThreshSlider.value);
    sendState();
  };

  const pose = new Pose({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${f}`});
  
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  pose.onResults(results => {
    if (currentMode !== 'pose') return;
    
    // Ensure canvas size matches video
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    
    if (canvas.width === 0) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (currentView === 'pose') {
        ctx.fillStyle = 'black';
        ctx.fillRect(0,0,canvas.width,canvas.height);
    } else {
        ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    }
    
    // Always draw mask overlay
    drawMaskOverlay();

    if(results.poseLandmarks){
      // Filter: only process if ANY landmark is inside the mask
      let isAnyLandmarkInside = true;
      if (maskPoints.length >= 3) {
          isAnyLandmarkInside = results.poseLandmarks.some(lm => isPointInPolygon(lm, maskPoints));
      }
      
      if (!isAnyLandmarkInside) {
          return; 
      }

      for(const lm of results.poseLandmarks){
        ctx.beginPath();
        ctx.arc(lm.x*canvas.width, lm.y*canvas.height, 3, 0, 2*Math.PI);
        ctx.fillStyle = 'rgba(0,255,0,0.7)';
        ctx.fill();
      }
      sendPose(results.poseLandmarks, canvas.width, canvas.height);
    }
  });

  // Web Worker for background processing ticker
  const workerCode = `
    let interval = 100; // 10 fps for stability and background
    let timer = null;
    onmessage = function(e) {
      if (e.data === 'start') {
        if (timer) clearInterval(timer);
        timer = setInterval(() => postMessage('tick'), interval);
      } else if (e.data === 'stop') {
        clearInterval(timer);
        timer = null;
      } else if (typeof e.data === 'number') {
        interval = e.data;
        if (timer) {
          clearInterval(timer);
          timer = setInterval(() => postMessage('tick'), interval);
        }
      }
    };
  `;
  const blob = new Blob([workerCode], {type: 'application/javascript'});
  const workerTicker = new Worker(URL.createObjectURL(blob));

  let isProcessing = false;
  let lastProcessTime = 0;
  const MIN_PROCESS_INTERVAL = 100; // Max 10 fps to save resources

  async function processFrame() {
    if (isProcessing) return;
    
    const now = Date.now();
    if (now - lastProcessTime < MIN_PROCESS_INTERVAL) return;

    if (video.paused || video.ended || video.readyState < 2) return;
    
    // Cap resolution to avoid memory/CPU stress (SIGILL errors)
    const maxWidth = 1280;
    const maxHeight = 720;
    let targetWidth = video.videoWidth;
    let targetHeight = video.videoHeight;
    
    if (targetWidth > maxWidth) {
        targetWidth = maxWidth;
        targetHeight = Math.floor(video.videoHeight * (maxWidth / video.videoWidth));
    }
    if (targetHeight > maxHeight) {
        targetHeight = maxHeight;
        targetWidth = Math.floor(video.videoWidth * (maxHeight / video.videoHeight));
    }

    if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
        canvas.width = targetWidth;
        canvas.height = targetHeight;
    }
    
    if (canvas.width === 0) return;

    isProcessing = true;
    lastProcessTime = now;
    
    try {
        if (currentMode === 'pose') {
            await pose.send({image: video});

        } else if (currentMode === 'light') {
            processBrightLight();
        }
    } catch (e) {
        console.error('Frame processing error:', e);
    } finally {
        isProcessing = false;
    }
  }

  workerTicker.onmessage = processFrame;
  
  // Foreground loop using rAF for extra responsiveness when visible
  function foregroundLoop() {
      if (document.visibilityState === 'visible') {
          processFrame();
      }
      requestAnimationFrame(foregroundLoop);
  }
  requestAnimationFrame(foregroundLoop);



  // Capture a reference frame (LED off) so we can detect what changes during recording
  function captureReferenceFrame() {
    if (canvas.width === 0 || video.readyState < 2) return false;
    // Use a fresh draw of the video to avoid reading our own overlays
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = canvas.width;
    tmpCanvas.height = canvas.height;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.drawImage(video, 0, 0, tmpCanvas.width, tmpCanvas.height);
    const imageData = tmpCtx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
    const d = imageData.data;
    referenceFrameData = new Uint8Array(tmpCanvas.width * tmpCanvas.height);
    for (let i = 0; i < referenceFrameData.length; i++) {
      const idx = i * 4;
      referenceFrameData[i] = Math.max(d[idx], d[idx+1], d[idx+2]);
    }
    referenceWidth = tmpCanvas.width;
    referenceHeight = tmpCanvas.height;
    console.log('Reference frame captured', referenceWidth + 'x' + referenceHeight);
    return true;
  }

  function processBrightLight() {
    if (currentMode !== 'light') return;
    if (canvas.width === 0) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (currentView === 'pose') {
        ctx.fillStyle = 'black';
        ctx.fillRect(0,0,canvas.width,canvas.height);
    } else {
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
    }

    drawMaskOverlay();

    // Draw last confirmed point (magenta ring)
    if (lastSentLightPoint) {
        const lx = lastSentLightPoint.x * canvas.width;
        const ly = lastSentLightPoint.y * canvas.height;
        ctx.beginPath();
        ctx.arc(lx, ly, 25, 0, 2 * Math.PI);
        ctx.strokeStyle = '#FF00FF';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(lx, ly, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#FF00FF';
        ctx.fill();
    }

    try {
        const threshold = parseInt(lightThreshSlider.value);

        if (isRecordingHold && referenceFrameData &&
            referenceWidth === canvas.width && referenceHeight === canvas.height) {

            // --- DELTA DETECTION (recording window) ---
            // Read raw video pixels through a temp canvas to avoid reading our overlay drawings
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = canvas.width;
            tmpCanvas.height = canvas.height;
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(video, 0, 0, tmpCanvas.width, tmpCanvas.height);
            const imageData = tmpCtx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
            const data = imageData.data;

            let bestDelta = 0;
            let bestX = 0, bestY = 0;
            let sumX = 0, sumY = 0, count = 0, totalDelta = 0;

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    const cur = Math.max(data[i], data[i+1], data[i+2]);
                    const ref = referenceFrameData[y * canvas.width + x];
                    const delta = cur - ref;

                    if (delta > threshold) {
                        if (maskPoints.length >= 3 && !isPointInPolygon({ x: x / canvas.width, y: y / canvas.height }, maskPoints)) continue;

                        if (delta > bestDelta + 5) {
                            // New brighter delta cluster - reset
                            bestDelta = delta;
                            bestX = x; bestY = y;
                            sumX = x; sumY = y; count = 1; totalDelta = delta;
                        } else if (delta >= bestDelta - 5) {
                            if (delta > bestDelta) bestDelta = delta;
                            sumX += x; sumY += y; count++; totalDelta += delta;
                        }
                    }
                }
            }

            if (count > 0) {
                const centerX = sumX / count;
                const centerY = sumY / count;
                const normX = centerX / canvas.width;
                const normY = centerY / canvas.height;

                // Cyan circle = live delta detection
                ctx.beginPath();
                ctx.arc(centerX, centerY, 20, 0, 2 * Math.PI);
                ctx.strokeStyle = '#00FFFF';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#00FFFF';
                ctx.fill();
                ctx.fillStyle = '#00FFFF';
                ctx.font = '11px monospace';
                ctx.fillText('\u0394' + bestDelta.toFixed(0) + ' (' + count + 'px)', centerX + 12, centerY - 8);

                // Keep best detection in window
                if (!bestPointInWindow || totalDelta > bestPointInWindow.clusterScore) {
                    bestPointInWindow = {
                        point: { x: normX, y: normY, brightness: bestDelta / 255 },
                        clusterScore: totalDelta
                    };
                }
            }

        } else {
            // --- LIVE PREVIEW (not recording): show absolute brightest spot as aim guide ---
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let maxB = 0, bx = 0, by = 0;
            const step = 3;
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const i = (y * canvas.width + x) * 4;
                    const b = Math.max(data[i], data[i+1], data[i+2]);
                    if (b > maxB) {
                        if (maskPoints.length >= 3 && !isPointInPolygon({ x: x / canvas.width, y: y / canvas.height }, maskPoints)) continue;
                        maxB = b; bx = x; by = y;
                    }
                }
            }
            if (maxB > 80) {
                ctx.beginPath();
                ctx.arc(bx, by, 14, 0, 2 * Math.PI);
                ctx.strokeStyle = 'rgba(0,255,255,0.25)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }
    } catch (e) {
        console.error('Light detection error:', e);
    }
  }

  loadCameras();

  document.querySelectorAll('input[name="view"]').forEach(r => {
    r.onchange = () => {
      const v = r.value;
      video.style.display = (v==='both'||v==='video')?'block':'none';
      canvas.style.display = (v==='both'||v==='pose')?'block':'none';
    };
  });

  function toggleFullscreen(elem) {
    if (!document.fullscreenElement) {
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) { /* Safari */
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { /* IE11 */
        elem.msRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) { /* Safari */
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) { /* IE11 */
        document.msExitFullscreen();
      }
    }
  }

  document.getElementById('fsOutputBtn').onclick = () => toggleFullscreen(videoContainer);
  videoContainer.ondblclick = () => toggleFullscreen(videoContainer);

  if(autoReconnect) connectWS();
  
  // Keyboard handling for 'r' trigger
  // Workflow: r pressed (LED off) -> reference frame captured -> LED turns on at 400ms for 700ms
  //           -> delta detection fires -> best point sent -> window closes at 1300ms
  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'r') {
      if (isRecordingHold) return;
      console.log("'r' pressed - capturing reference, arming detection");

      // Step 1: capture reference BEFORE arming so first frames see the delta
      captureReferenceFrame();
      bestPointInWindow = null;

      if (recordingTimeout) clearTimeout(recordingTimeout);

      // Small delay: let the system signal the LED to turn on before we start collecting
      // Hardware LED turns on at ~400ms, stays on for 700ms (until ~1100ms).
      setTimeout(() => {
        isRecordingHold = true;

        // Visual feedback
        if (!originalDotClass) originalDotClass = statusDot.className;
        statusDot.className = 'w-3 h-3 rounded-full bg-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.8)] animate-pulse';
        setStatus('Recording Hold...', 'text-cyan-400');

        // Window: 1000ms duration (ends at 1300ms total, safely covering the 400ms->1100ms flash)
        recordingTimeout = setTimeout(() => {
          isRecordingHold = false;
          referenceFrameData = null; // Clear reference
          console.log('Light detection disarmed');

          if (bestPointInWindow) {
              sendLight([bestPointInWindow.point], canvas.width, canvas.height);
              lastSentLightPoint = { x: bestPointInWindow.point.x, y: bestPointInWindow.point.y };
              console.log('Sent delta point:', bestPointInWindow.point.x.toFixed(3), bestPointInWindow.point.y.toFixed(3), 'score:', bestPointInWindow.clusterScore.toFixed(0));
              statusDot.className = 'w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]';
              setTimeout(() => { if (!isRecordingHold) statusDot.className = originalDotClass; }, 2000);
          } else {
              setStatus('No light detected', 'text-yellow-400');
              statusDot.className = originalDotClass;
          }
        }, 1000);
      }, 300); // 300ms delay: plenty of time for reference to be captured before LED turns on at 400ms
    }
  });

  // Set initial view state
  setView('both');
</script>
